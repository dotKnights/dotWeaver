# Déploiement Coolify du WORKER runner (build pack « Docker Compose »).
#
# Pourquoi compose et pas « Dockerfile » seul : le runner doit bind-monter le socket
# Docker de l'hôte + un dossier workspace partagé. Coolify filtre les `-v` dans les
# « custom docker run options » et n'expose pas la gestion des volumes via son API ;
# le compose, lui, permet des volumes arbitraires. Les `${...}` sont injectés depuis
# les variables d'environnement définies sur l'application Coolify.
#
# ⚠️ Les deux chemins du workspace sont IDENTIQUES (hôte = conteneur) : le bind
# `-v <checkout>:/workspace` des conteneurs agents est résolu par le démon de l'hôte.

services:
  runner:
    build:
      context: .
      dockerfile: Dockerfile
      # Réseau hôte pendant le build : sinon `docker compose build` n'a pas de DNS
      # et `apt-get` échoue (exit 100).
      network: host
    restart: unless-stopped
    networks:
      - coolify
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /data/dotweaver/workspaces:/data/dotweaver/workspaces
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - WORKSPACE_ROOT=${WORKSPACE_ROOT}
      - RUNNER_IMAGE=${RUNNER_IMAGE}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - CODEX_API_KEY=${CODEX_API_KEY}
      - CODEX_ACCESS_TOKEN=${CODEX_ACCESS_TOKEN}
      - CODEX_AUTH_JSON_PATH=${CODEX_AUTH_JSON_PATH}
      - RUN_TIMEOUT_MS=${RUN_TIMEOUT_MS}
      # Réseau des conteneurs agents. Le bridge Docker par défaut n'a ni DNS ni egress
      # sur cet hôte (Oracle Cloud) → l'agent ne joint pas l'API (FailedToOpenSocket).
      # `coolify` (réseau user-defined) fournit DNS embarqué + sortie internet.
      - RUNNER_NETWORK=${RUNNER_NETWORK}
      # Auth (better-auth) : le worker importe src/lib/server/auth.ts via github-git.ts
      # (récupération du token GitHub de clone). auth.ts évalue `new URL('/mcp', BETTER_AUTH_URL)`
      # au chargement du module → BETTER_AUTH_URL est OBLIGATOIRE, sinon le worker crashe au boot.
      # BETTER_AUTH_SECRET doit être IDENTIQUE au front (déchiffrement des tokens OAuth chiffrés en base).
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}

# Réseau Coolify partagé : permet de résoudre le hostname interne du Postgres.
networks:
  coolify:
    external: true
